name: Nightly E2E

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  e2e-devnet:
    name: E2E
    runs-on: ubuntu-latest
    env:
      MIDNIGHT_NETWORK: undeployed
      TOOLKIT_VERSION: '0.18.1-ledger-61-support'
      NODE_URL: ${{ secrets.DEVNET_NODE_URL }}
      NODE_WS_URL: ${{ secrets.DEVNET_NODE_WS_URL }}
      INDEXER_URL: ${{ secrets.DEVNET_INDEXER_URL }}
      INDEXER_WS_URL: ${{ secrets.DEVNET_INDEXER_WS_URL }}
      PROOF_SERVER_URL: ${{ secrets.DEVNET_PROOF_SERVER_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run E2E Tests
        run: ./scripts/run-e2e.sh
