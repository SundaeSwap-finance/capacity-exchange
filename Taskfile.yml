version: '3'

includes:
  _build:
    taskfile: taskfiles/build.yml
    internal: true
    vars:
      CONTRACTS_DIR: '{{.CONTRACTS_DIR}}'
      WEBAPP_DIR: '{{.WEBAPP_DIR}}'
  _example:
    taskfile: taskfiles/example.yml
    internal: true
    vars:
      CONTRACTS_DIR: '{{.CONTRACTS_DIR}}'
      WEBAPP_DIR: '{{.WEBAPP_DIR}}'
      COMPACTC_BIN: '{{.ROOT_DIR}}/tools/compactc/bin/compactc'

vars:
  CONTRACTS_DIR: '{{.ROOT_DIR}}/packages/example-webapp/contracts'
  WEBAPP_DIR: '{{.ROOT_DIR}}/packages/example-webapp'

tasks:
  install:
    desc: Install dependencies
    preconditions:
      - sh: command -v bun
        msg: 'bun is not installed. Install it: https://bun.sh'
      - sh: 'BUN_V=$(bun --version) && test "$(printf "%s\n1.1.0\n" "$BUN_V" | sort -V | head -1)" = "1.1.0"'
        msg: "bun >= 1.1.0 is required. Update with: bun upgrade"
    cmds:
      - task: _build:install

  compile-contracts:
    desc: Compile Compact contracts (auto-extracts compiler)
    deps: [_build:extract-compactc]
    cmds:
      - task: _example:compile

  deploy:
    desc: Deploy contracts for a network
    deps: [_build:midnight-node, _example:require-compiled]
    preconditions:
      - sh: 'test -f {{.ROOT_DIR}}/wallet-mnemonic.{{.NETWORK_ID}}.txt'
        msg: 'Missing wallet-mnemonic.{{.NETWORK_ID}}.txt — run task setup to create it'
    cmds:
      - bun run --cwd {{.CONTRACTS_DIR}} deploy-all {{.NETWORK_ID}}
      - task: _example:copy-configs
    requires:
      vars: [NETWORK_ID]

  prompt-mnemonic:
    internal: true
    vars:
      MNEMONIC_FILE: '{{.ROOT_DIR}}/wallet-mnemonic.{{.NETWORK_ID}}.txt'
    status:
      - test -f {{.MNEMONIC_FILE}}
    cmds:
      - echo "Enter your wallet mnemonic for {{.NETWORK_ID}}:" && read MNEMONIC < /dev/tty && echo "$MNEMONIC" > {{.MNEMONIC_FILE}}

  init-env:
    internal: true
    status:
      - test -f {{.ROOT_DIR}}/wallet-mnemonic.{{.NETWORK_ID}}.txt
      - test -f {{.CONTRACTS_DIR}}/.env
      - test -f {{.ROOT_DIR}}/packages/server/.env
      - test -f {{.WEBAPP_DIR}}/.env
    cmds:
      - task: prompt-mnemonic
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
      - cp -n {{.CONTRACTS_DIR}}/.env.example {{.CONTRACTS_DIR}}/.env
      - cp -n {{.ROOT_DIR}}/packages/server/.env.example {{.ROOT_DIR}}/packages/server/.env
      - cp -n {{.WEBAPP_DIR}}/.env.example {{.WEBAPP_DIR}}/.env

  setup:
    desc: 'One-time setup: configure env, install, build, deploy'
    cmds:
      - task: init-env
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
      - task: install
      - task: compile-contracts
      - task: _example:copy-zk-assets
      - task: _build:webapp
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
      - task: _build:server
      - task: deploy
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
      - echo "Setup complete. Run 'NETWORK_ID={{.NETWORK_ID}} task dev' to start."
    requires:
      vars: [NETWORK_ID]

  dev:
    desc: Start server and webapp with hot-reload
    deps: [_example:require-deployed, _build:libs]
    env:
      VITE_NETWORK_ID: '{{.NETWORK_ID}}'
      MIDNIGHT_NETWORK: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/midnight-core build:watch & bun run --filter @capacity-exchange/midnight-node build:watch & bun run --filter @capacity-exchange/components build:watch & bun run --filter @capacity-exchange/server dev & bun run --filter @capacity-exchange/example-webapp dev & wait
    requires:
      vars: [NETWORK_ID]

  dev:server:
    desc: Start the capacity exchange server with hot-reload
    deps: [_build:midnight-node]
    env:
      MIDNIGHT_NETWORK: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/midnight-core build:watch & bun run --filter @capacity-exchange/midnight-node build:watch & bun run --filter @capacity-exchange/server dev & wait
    requires:
      vars: [NETWORK_ID]

  dev:webapp:
    desc: Start the example webapp with hot-reload
    deps: [_example:require-deployed, _build:components]
    env:
      VITE_NETWORK_ID: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/midnight-core build:watch & bun run --filter @capacity-exchange/midnight-node build:watch & bun run --filter @capacity-exchange/components build:watch & bun run --filter @capacity-exchange/example-webapp dev & wait
    requires:
      vars: [NETWORK_ID]

  build:
    desc: Build all packages and compile/copy contracts
    cmds:
      - task: _example:compile
      - task: _example:copy-zk-assets
      - task: _example:copy-configs
      - task: _build:webapp
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
      - task: _build:server
      - task: _build:typecheck-contracts
    requires:
      vars: [NETWORK_ID]

  build-all:
    desc: Typecheck all TypeScript packages (requires compiled contracts)
    cmds:
      - task: _build:build-all

  test:
    desc: Run tests
    deps: [_build:libs]
    cmds:
      - bun run --if-present --filter '*' test

  check:
    desc: Lint and format check
    deps: [_build:install]
    cmds:
      - bun run check

  fix:
    desc: Lint and format fix
    deps: [_build:install]
    cmds:
      - bun run fix

  clean:
    desc: Clean build artifacts
    cmds:
      - bun run --filter '*' clean
      - rm -rf node_modules
