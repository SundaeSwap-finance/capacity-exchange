version: '3'

vars:
  CONTRACTS_DIR: packages/example-webapp/contracts
  WEBAPP_DIR: packages/example-webapp

tasks:
  install:
    run: once
    desc: Install dependencies
    preconditions:
      - sh: command -v bun
        msg: 'bun is not installed. Install it: https://bun.sh'
    cmds:
      - bun install

  # --- Precondition tasks ---

  require-compilable-contracts:
    internal: true
    run: once
    preconditions:
      - sh: test -d {{.CONTRACTS_DIR}}/counter/out || (test -n "${COMPACTC:-}" && test -f "$COMPACTC")
        msg: |
          Compiled contracts not found. Either:
            1. Set COMPACTC to a valid compactc binary path (contracts will be compiled automatically)
            2. Run 'task compile-contracts' first

  require-deployed-contracts:
    internal: true
    run: once
    preconditions:
      - sh: 'ls {{.WEBAPP_DIR}}/public/contracts/.contracts.*.json >/dev/null 2>&1'
        msg: "Setup not complete: deployed contract configs not found in {{.WEBAPP_DIR}}/public/contracts/. Run 'COMPACTC=... NETWORK_ID=... task setup' first."

  # --- Package build tasks (mirror dependency graph) ---

  build-core:
    internal: true
    deps: [install]
    cmds:
      - bun run --filter @capacity-exchange/core build

  build-client:
    internal: true
    deps: [install]
    cmds:
      - bun run --filter @capacity-exchange/client build

  build-components:
    internal: true
    deps: [build-core, build-client]
    cmds:
      - bun run --filter @capacity-exchange/components build

  build-libs:
    internal: true
    deps: [build-components]

  build-server:
    internal: true
    deps: [build-core]
    cmds:
      - bun run --filter @capacity-exchange/server build

  build-webapp:
    internal: true
    deps: [require-compilable-contracts, build-libs, copy-zk-assets, copy-contract-configs]
    env:
      VITE_NETWORK_ID: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/example-webapp build
    requires:
      vars: [NETWORK_ID]

  # --- Contract tasks ---

  compile-contracts:
    desc: Compile Compact contracts (skipped if already compiled)
    status:
      - test -d {{.CONTRACTS_DIR}}/counter/out
    preconditions:
      - sh: test -n "${COMPACTC:-}"
        msg: |
          Error: COMPACTC environment variable not set.
          First, unzip the correct archive for your platform to your home directory:
            unzip tools/compactc/compactc_v0.28.0_aarch64-darwin.zip -d ~/compactc_v0.28.0
          Then set the COMPACTC environment variable:
            export COMPACTC=~/compactc_v0.28.0/compactc
      - sh: test -f "$COMPACTC"
        msg: 'Error: COMPACTC path does not exist: $COMPACTC'
      - sh: '"$COMPACTC" --version | grep -q "0.28.0"'
        msg: 'Error: COMPACTC version mismatch. Required: 0.28.0'
    cmds:
      - bun run --cwd {{.CONTRACTS_DIR}} compile

  copy-zk-assets:
    internal: true
    deps: [compile-contracts]
    cmds:
      - bun run --filter @capacity-exchange/example-webapp copy-zk-assets

  copy-contract-configs:
    internal: true
    cmds:
      - mkdir -p {{.WEBAPP_DIR}}/public/contracts
      - cp {{.CONTRACTS_DIR}}/.contracts.*.json {{.WEBAPP_DIR}}/public/contracts/ 2>/dev/null || true

  # --- High-level targets ---

  typecheck-contracts:
    internal: true
    deps: [build-components]
    preconditions:
      - sh: test -d {{.CONTRACTS_DIR}}/counter/out && test -d {{.CONTRACTS_DIR}}/token-mint/out
        msg: "Compiled contract output not found. Run 'task compile-contracts' first."
    cmds:
      - bun run --filter @capacity-exchange/example-contracts build

  # TODO: Also typecheck test directories (packages/*/tests)
  build-all:
    desc: Typecheck all TypeScript packages (requires compiled contracts)
    deps: [build-libs, build-server, typecheck-contracts]
    cmds:
      - bun run --filter @capacity-exchange/example-webapp typecheck
      - bun run --filter @capacity-exchange/bridge-webapp typecheck

  build:
    desc: Build all packages and compile/copy contracts
    deps: [require-compilable-contracts, build-webapp, build-server, typecheck-contracts]

  setup:
    desc: 'One-time setup: install, build everything, and deploy'
    deps: [require-compilable-contracts, build]
    cmds:
      - task: deploy
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
      - echo "Setup complete. Run 'task dev' to start the dev server."
    requires:
      vars: [NETWORK_ID]

  # server depends on: core
  dev:server:
    desc: Start the capacity exchange server with hot-reload
    deps: [build-core]
    env:
      MIDNIGHT_NETWORK: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/core build:watch & bun run --filter @capacity-exchange/server dev & wait
    requires:
      vars: [NETWORK_ID]

  # webapp depends on: core, client, components, compiled + deployed contracts
  dev:webapp:
    desc: Start the example webapp with hot-reload
    deps: [require-deployed-contracts, build-components]
    env:
      VITE_NETWORK_ID: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/core build:watch & bun run --filter @capacity-exchange/components build:watch & bun run --filter @capacity-exchange/example-webapp dev & wait
    requires:
      vars: [NETWORK_ID]

  # dev runs both — watchers cover union of deps (core, components), deduplicated
  dev:
    desc: Start server and webapp with hot-reload
    deps: [require-deployed-contracts, build-libs]
    env:
      VITE_NETWORK_ID: '{{.NETWORK_ID}}'
      MIDNIGHT_NETWORK: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/core build:watch & bun run --filter @capacity-exchange/components build:watch & bun run --filter @capacity-exchange/server dev & bun run --filter @capacity-exchange/example-webapp dev & wait
    requires:
      vars: [NETWORK_ID]

  deploy:
    desc: Deploy all contracts for a network
    deps: [build-core]
    preconditions:
      - sh: test -d {{.CONTRACTS_DIR}}/counter/out
        msg: "Compiled contracts not found. Run 'task compile-contracts' first."
      - sh: 'UPPER=$(echo "{{.NETWORK_ID}}" | tr "[:lower:]" "[:upper:]") && grep -qE "^${UPPER}_SEED=|^${UPPER}_MNEMONIC=" {{.CONTRACTS_DIR}}/.env 2>/dev/null'
        msg: 'Missing <NETWORK_ID>_SEED or <NETWORK_ID>_MNEMONIC in {{.CONTRACTS_DIR}}/.env (NETWORK_ID={{.NETWORK_ID}})'
    cmds:
      - bun run --cwd {{.CONTRACTS_DIR}} deploy-all {{.NETWORK_ID}}
      - task: copy-contract-configs
    requires:
      vars: [NETWORK_ID]

  test:
    desc: Run tests
    deps: [build-libs]
    cmds:
      - bun run --if-present --filter '*' test

  test:e2e:
    desc: Run E2E tests
    deps: [build-libs]
    cmds:
      - bun run --if-present --filter '*' test:e2e
  check:
    desc: Lint and format check
    deps: [install]
    cmds:
      - bun run check

  fix:
    desc: Lint and format fix
    deps: [install]
    cmds:
      - bun run fix

  clean:
    desc: Clean build artifacts
    cmds:
      - bun run --filter '*' clean
      - rm -rf node_modules
