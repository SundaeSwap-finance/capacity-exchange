name: Nightly chain snapshot

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_fresh:
        description: 'Ignore cached snapshot and sync from genesis. Use when you suspect the cache has been corrupted, the SDK has been upgraded, or the chain has reset.'
        type: boolean
        default: false

jobs:
  chain-snapshot:
    name: 'Chain snapshot (${{ matrix.env }})'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        env: [preview, preprod, mainnet]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: task build:libs

      - name: Restore cached chain snapshot
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v4
        with:
          path: .chain-snapshots
          key: chain-snapshot-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}
          restore-keys: |
            chain-snapshot-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-
            chain-snapshot-${{ matrix.env }}-

      - name: Diagnose connectivity (debug)
        run: |
          set +e
          declare -A HOSTS=(
            [preview]=rpc.preview.midnight.network
            [preprod]=rpc.preprod.midnight.network
            [mainnet]=rpc.mainnet.midnight.network
          )
          host="${HOSTS[${{ matrix.env }}]}"
          echo "=== runner public IP ==="
          curl -s --max-time 5 https://api.ipify.org; echo
          echo
          echo "=== host: $host ==="
          echo "--- A records ---"
          dig +short "$host"
          echo
          echo "=== per-IP WS upgrade probe ==="
          for ip in $(dig +short "$host"); do
            echo "--- $ip ---"
            # Send actual WS upgrade handshake against this specific backend; dump full response headers
            curl -sk --http1.1 --max-time 10 \
              --resolve "$host:443:$ip" \
              -H "Connection: Upgrade" \
              -H "Upgrade: websocket" \
              -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
              -H "Sec-WebSocket-Version: 13" \
              -D - \
              -o /dev/null \
              "https://$host/ws"
            echo
          done
          echo "=== end diagnostics ==="

      - name: Update chain snapshot
        run: |
          bun scripts/update-wallet-snapshots.ts \
            --out-dir .chain-snapshots \
            ${{ inputs.force_fresh && '--force-fresh' || '' }} \
            ${{ matrix.env }}

      - name: Save chain snapshot cache
        uses: actions/cache/save@v4
        with:
          path: .chain-snapshots
          key: chain-snapshot-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}

      - name: Upload chain snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: chain-snapshot-${{ matrix.env }}
          path: .chain-snapshots/
          include-hidden-files: true
          retention-days: 30
