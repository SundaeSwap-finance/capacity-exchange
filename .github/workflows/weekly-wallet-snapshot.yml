name: Weekly wallet snapshot

# Refreshes the committed chain snapshots under apps/demo/public/wallet-snapshots
# by resuming from the files already in that directory (incremental sync) and
# opening a PR with the updated files. Reuses an existing open PR if one exists.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays at 06:00 UTC
  workflow_dispatch:
    inputs:
      force_fresh:
        description: 'Ignore the committed snapshot and sync from genesis. Use when you suspect the snapshot is corrupted, the SDK has been upgraded, or the chain has reset.'
        type: boolean
        default: false

jobs:
  wallet-snapshot:
    name: Refresh wallet snapshots
    runs-on: ubuntu-latest
    # Networks sync sequentially in a single job; a fresh mainnet genesis sync
    # can take hours, so give the whole job plenty of headroom.
    timeout-minutes: 600
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: task build:libs

      # Resumes from the files already committed in apps/demo/public/wallet-snapshots
      # (unless --force-fresh is set). continue-on-error so a single failing
      # network still lets the successfully-updated snapshots be PR'd.
      - name: Update wallet snapshots
        id: update
        continue-on-error: true
        run: |
          bun scripts/update-wallet-snapshots.ts \
            --out-dir apps/demo/public/wallet-snapshots \
            ${{ inputs.force_fresh && '--force-fresh' || '' }}

      # Uses the default GITHUB_TOKEN (no secrets to set up). Note: PRs opened
      # with GITHUB_TOKEN do NOT trigger the CI workflow — to run CI on this PR,
      # push an empty commit to the branch manually:
      #   git commit --allow-empty -m "trigger ci" && git push
      - name: Open or update snapshot PR
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: apps/demo/public/wallet-snapshots
          branch: automated/wallet-snapshots
          commit-message: 'chore: refresh wallet snapshots'
          title: 'chore: refresh wallet snapshots'
          body: |
            Automated weekly refresh of the committed chain snapshots under
            `apps/demo/public/wallet-snapshots`.

            Generated by the [Weekly wallet snapshot](../actions/workflows/weekly-wallet-snapshot.yml) workflow
            (run [${{ github.run_id }}](../actions/runs/${{ github.run_id }})).
          labels: automated

      # Surface a partial/total failure of the sync itself, after the PR for any
      # successful networks has been opened.
      - name: Fail if snapshot sync failed
        if: steps.update.outcome == 'failure'
        run: |
          echo "::error::update-wallet-snapshots.ts reported failures; check the 'Update wallet snapshots' step."
          exit 1
