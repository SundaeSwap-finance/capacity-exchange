name: 'Test'

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Setup
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      # Cheap tests
      - name: Check linting/formatting
        run: task check
      - name: Check autogenerated client
        run: task check-client
      - name: Run tests
        run: task test

      # Expensive tests
      - name: Run testnet
        uses: hoverkraft-tech/compose-action@v2
        with:
          compose-file: ./testnet/standalone.yml
      - name: Run e2e tests
        run: task test:e2e
      - name: Print server logs
        if: always()
        run: cat apps/server/*_server.log
