name: CI

on:
  push:

jobs:
  checks:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    steps:
      # Setup
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      # Checks
      - name: Check linting/formatting
        run: task check
      - name: Check autogenerated client
        run: task check-client
      - name: Run unit tests
        run: task test

  e2e:
    name: CES e2e tests (local devnet)
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Start local devnet
        uses: hoverkraft-tech/compose-action@v2
        with:
          compose-file: ./testnet/standalone.yml

      - name: Wait for indexer API
        run: timeout 60 bash -c 'until curl -sSf http://localhost:8088/ready; do sleep 2; done'

      - name: Run e2e tests
        run: task test:e2e
      - name: Print server logs
        if: always()
        run: cat apps/server/*_server.log 2>/dev/null || true

  integ:
    name: CES + SDK integration tests (preview network)
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: task install

      - name: Compile contracts
        run: task compile-contracts

      - name: Build packages
        run: task build:libs

      - name: Restore cached state
        uses: actions/cache@v4
        with:
          path: |
            apps/server/.wallet-state-ci
            .chain-snapshots
          key: integ-state-${{ hashFiles('bun.lock') }}
          restore-keys: integ-state-

      - name: Run integration tests
        env:
          CES_WALLET_MNEMONIC: ${{ secrets.CES_WALLET_MNEMONIC }}
          COUNTER_ADDRESS: ${{ vars.INTEG_COUNTER_ADDRESS }}
          TOKEN_MINT_ADDRESS: ${{ vars.INTEG_TOKEN_MINT_ADDRESS }}
          DERIVED_TOKEN_COLOR: ${{ vars.INTEG_DERIVED_TOKEN_COLOR }}
        run: scripts/ci-integ-setup.sh
