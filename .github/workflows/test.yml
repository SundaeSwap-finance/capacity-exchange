name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      force_fresh:
        description: 'Ignore cached chain snapshot + wallet state. Sync from genesis and overwrite caches'
        type: boolean
        default: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Checks
      - name: Check linting/formatting
        run: task check
      - name: Check autogenerated client
        run: task check-client
      - name: Run unit tests
        run: task test

  integ:
    name: Integration tests (local devnet)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Start local devnet
        uses: hoverkraft-tech/compose-action@v2
        with:
          compose-file: ./testnet/standalone.yml

      - name: Wait for indexer API
        run: timeout 60 bash -c 'until curl -sSf http://localhost:8088/ready; do sleep 2; done'

      - name: Compile contracts
        run: task compile-contracts

      - name: Run integration tests
        run: task test:integ
      - name: Print server logs
        if: always()
        run: cat apps/server/*_server.log 2>/dev/null || true

  chain-snapshot:
    name: 'Chain snapshot (${{ matrix.env }})'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        env: [preview]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: task install

      - name: Build packages
        run: task build:libs

      - name: Restore cached chain snapshot
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v4
        with:
          path: .chain-snapshots
          key: chain-snapshot-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}
          restore-keys: |
            chain-snapshot-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-
            chain-snapshot-${{ matrix.env }}-

      - name: Update chain snapshot
        run: |
          bun scripts/update-wallet-snapshots.ts \
            --out-dir .chain-snapshots \
            ${{ inputs.force_fresh && '--force-fresh' || '' }} \
            ${{ matrix.env }}

      - name: Save chain snapshot cache
        uses: actions/cache/save@v4
        with:
          path: .chain-snapshots
          key: chain-snapshot-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}

      - name: Upload chain snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: chain-snapshot-${{ matrix.env }}
          path: .chain-snapshots/
          include-hidden-files: true
          retention-days: 5

  smoke:
    name: 'Smoke tests (${{ matrix.env }})'
    needs: chain-snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        env: [preview]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: task install

      - name: Compile contracts
        run: task compile-contracts

      - name: Build packages
        run: task build:libs

      - name: Restore chain snapshot
        uses: actions/cache/restore@v4
        with:
          path: .chain-snapshots
          key: chain-snapshot-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}
          restore-keys: |
            chain-snapshot-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-
            chain-snapshot-${{ matrix.env }}-

      - name: Restore wallet state
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v4
        with:
          path: .wallet-states
          key: wallet-state-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}
          restore-keys: |
            wallet-state-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-
            wallet-state-${{ matrix.env }}-

      - name: Run smoke tests
        env:
          CES_WALLET_MNEMONIC: ${{ secrets[format('CES_WALLET_MNEMONIC_{0}', matrix.env)] }}
          REGISTRY_WALLET_MNEMONIC: ${{ secrets[format('REGISTRY_WALLET_MNEMONIC_{0}', matrix.env)] }}
          COUNTER_ADDRESS: ${{ vars[format('E2E_COUNTER_ADDRESS_{0}', matrix.env)] }}
          TOKEN_MINT_ADDRESS: ${{ vars[format('E2E_TOKEN_MINT_ADDRESS_{0}', matrix.env)] }}
          DERIVED_TOKEN_COLOR: ${{ vars[format('E2E_DERIVED_TOKEN_COLOR_{0}', matrix.env)] }}
        run: scripts/ci-test.sh ${{ matrix.env }}

      - name: Save wallet state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .wallet-states
          key: wallet-state-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}
