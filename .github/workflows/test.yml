name: CI

on:
  push:
  workflow_dispatch:
    inputs:
      force_fresh:
        description: 'Ignore cached chain snapshot + wallet state and sync from genesis (use after SDK upgrades or chain resets that invalidate cached wallet/chain state).'
        type: boolean
        default: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Checks
      - name: Check linting/formatting
        run: task check
      - name: Check autogenerated client
        run: task check-client
      - name: Build all packages + demo webapp
        run: task build-all
      - name: Run unit tests
        run: task test

  integ:
    name: Integration tests (local devnet)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Start local devnet
        uses: hoverkraft-tech/compose-action@v2
        with:
          compose-file: ./testnet/standalone.yml

      - name: Wait for indexer API
        run: timeout 60 bash -c 'until curl -sSf http://localhost:8088/ready; do sleep 2; done'

      - name: Compile contracts
        run: task compile-contracts

      - name: Run integration tests
        run: task test:integ
      - name: Print server logs
        if: always()
        run: cat apps/server/*_server.log 2>/dev/null || true

  smoke:
    name: 'Smoke tests (${{ matrix.env }})'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        env: [preview]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: go-task/setup-task@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile contracts
        run: task compile-contracts

      - name: Build packages
        run: task build:libs

      # Chain snapshot sync start point comes from the committed snapshots in
      # apps/demo/public/wallet-snapshots (refreshed weekly by the
      # weekly-wallet-snapshot workflow), so no cache restore is needed here.

      - name: Restore wallet state
        if: ${{ !inputs.force_fresh }}
        uses: actions/cache/restore@v4
        with:
          path: .wallet-states
          key: wallet-state-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}
          restore-keys: |
            wallet-state-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-
            wallet-state-${{ matrix.env }}-

      - name: Run smoke tests
        env:
          CES_WALLET_MNEMONIC: ${{ secrets[format('CES_WALLET_MNEMONIC_{0}', matrix.env)] }}
          REGISTRY_WALLET_MNEMONIC: ${{ secrets[format('REGISTRY_WALLET_MNEMONIC_{0}', matrix.env)] }}
          # Pre-funded wallet with no DUST, but has the necessary unshielded tokens for the unshielded exchange flow tests.
          # Not passed for now, disabling unshielded smoke tests
          #UNSHIELDED_EXCHANGE_WALLET_MNEMONIC: ${{ secrets[format('CES_WALLET_MNEMONIC_NO_DUST_{0}', matrix.env)] }}
          COUNTER_ADDRESS: ${{ vars[format('E2E_COUNTER_ADDRESS_{0}', matrix.env)] }}
          TOKEN_MINT_ADDRESS: ${{ vars[format('E2E_TOKEN_MINT_ADDRESS_{0}', matrix.env)] }}
          DERIVED_TOKEN_COLOR: ${{ vars[format('E2E_DERIVED_TOKEN_COLOR_{0}', matrix.env)] }}
          UNSHIELDED_TOKEN_COLOR: ${{ vars[format('E2E_UNSHIELDED_TOKEN_COLOR_{0}', matrix.env)] }}
        run: scripts/ci-test.sh ${{ matrix.env }}

      - name: Run fallback smoke tests
        env:
          CES_WALLET_MNEMONIC_NO_DUST: ${{ secrets[format('CES_WALLET_MNEMONIC_NO_DUST_{0}', matrix.env)] }}
          # Wallet with ONLY unshielded tokens to test paying peers with unshielded tokens.
          # Not passed for now, disabling unshielded smoke tests
          # CES_WALLET_MNEMONIC_NO_DUST_UNSHIELDED: ${{ secrets[format('CES_WALLET_MNEMONIC_NO_DUST_UNSHIELDED_{0}', matrix.env)] }}
          # CES_WALLET2_MNEMONIC reuses the main CES wallet secret.
          CES_WALLET2_MNEMONIC: ${{ secrets[format('CES_WALLET_MNEMONIC_{0}', matrix.env)] }}
          TOKEN_MINT_ADDRESS: ${{ vars[format('E2E_TOKEN_MINT_ADDRESS_{0}', matrix.env)] }}
          DERIVED_TOKEN_COLOR: ${{ vars[format('E2E_DERIVED_TOKEN_COLOR_{0}', matrix.env)] }}
          UNSHIELDED_TOKEN_COLOR: ${{ vars[format('E2E_UNSHIELDED_TOKEN_COLOR_{0}', matrix.env)] }}
        run: scripts/ci-fallback-test.sh ${{ matrix.env }}

      - name: Save wallet state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .wallet-states
          key: wallet-state-${{ matrix.env }}-${{ hashFiles('bun.lock') }}-${{ github.run_id }}
