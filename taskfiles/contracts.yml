version: '3'

# Internal contract tasks — compactc extraction, compilation, deployment helpers.
# Included by root Taskfile.yml under the _contracts namespace.

vars:
  COMPACTC_VERSION: 0.28.0
  COMPACTC_DIR: tools/compactc
  COMPACTC_BIN:
    sh: echo "$(pwd)/tools/compactc/bin/compactc"

tasks:
  # --- Compiler setup ---

  extract-compactc:
    run: once
    status:
      - test -f {{.COMPACTC_BIN}}
    vars:
      ARCH:
        sh: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          MACHINE=$(uname -m)
          case "${OS}_${MACHINE}" in
            darwin_arm64)  echo "aarch64-darwin" ;;
            darwin_x86_64) echo "x86_64-darwin" ;;
            linux_x86_64)  echo "x86_64-unknown-linux-musl" ;;
            *) echo "unsupported" ;;
          esac
    preconditions:
      - sh: test '{{.ARCH}}' != 'unsupported'
        msg: "Unsupported platform: $(uname -s) $(uname -m). Supported: macOS (ARM/Intel), Linux (x86_64)."
      - sh: test -f {{.COMPACTC_DIR}}/compactc_v{{.COMPACTC_VERSION}}_{{.ARCH}}.zip
        msg: "Compiler archive not found: {{.COMPACTC_DIR}}/compactc_v{{.COMPACTC_VERSION}}_{{.ARCH}}.zip"
    cmds:
      - mkdir -p {{.COMPACTC_DIR}}/bin
      - unzip -o {{.COMPACTC_DIR}}/compactc_v{{.COMPACTC_VERSION}}_{{.ARCH}}.zip -d {{.COMPACTC_DIR}}/bin
    generates:
      - '{{.COMPACTC_BIN}}'

  # --- Compilation ---

  compile:
    status:
      - test -d {{.CONTRACTS_DIR}}/counter/out
    deps: [extract-compactc]
    env:
      COMPACTC: '{{.COMPACTC_BIN}}'
    cmds:
      - bun run --cwd {{.CONTRACTS_DIR}} compile

  # --- Asset copying ---

  copy-zk-assets:
    deps: [compile]
    cmds:
      - bun run --filter @capacity-exchange/example-webapp copy-zk-assets

  copy-configs:
    cmds:
      - mkdir -p {{.WEBAPP_DIR}}/public/contracts
      - cp {{.CONTRACTS_DIR}}/.contracts.*.json {{.WEBAPP_DIR}}/public/contracts/ 2>/dev/null || true

  # --- Preconditions ---

  require-compiled:
    run: once
    preconditions:
      - sh: test -d {{.CONTRACTS_DIR}}/counter/out
        msg: "Compiled contracts not found. Run 'task compile-contracts' first."

  require-deployed:
    run: once
    preconditions:
      - sh: 'ls {{.WEBAPP_DIR}}/public/contracts/.contracts.*.json >/dev/null 2>&1'
        msg: "Deployed contract configs not found. Run 'NETWORK_ID=... task setup' first."
