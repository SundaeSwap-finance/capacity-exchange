version: '3'

# Internal dev tasks — long-running watch/serve processes with prefixed output.
# Included by root Taskfile.yml under the _dev namespace.

tasks:
  # --- Service processes ---

  core:
    internal: true
    prefix: core
    cmds:
      - bun run --filter @capacity-exchange/midnight-core build:watch

  node:
    internal: true
    prefix: node
    cmds:
      - bun run --filter @capacity-exchange/midnight-node build:watch

  components:
    internal: true
    prefix: components
    cmds:
      - bun run --filter @capacity-exchange/components build:watch

  server:
    internal: true
    prefix: server
    env:
      MIDNIGHT_NETWORK: '{{.NETWORK_ID}}'
      PRICE_CONFIG_FILE: 'price-config.{{.NETWORK_ID}}.json'
    cmds:
      - bun run --filter @capacity-exchange/server dev

  webapp:
    internal: true
    prefix: webapp
    env:
      VITE_NETWORK_ID: '{{.NETWORK_ID}}'
      VITE_CAPACITY_EXCHANGE_URL: '{{.CAPACITY_EXCHANGE_URL}}'
    cmds:
      - bun run --filter @capacity-exchange/example-webapp dev

  # --- Composite targets (deps run concurrently) ---

  all:
    internal: true
    deps:
      - core
      - node
      - components
      - task: server
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
      - task: webapp
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
          CAPACITY_EXCHANGE_URL: 'http://localhost:3000'

  server-only:
    internal: true
    deps:
      - core
      - node
      - task: server
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'

  webapp-only:
    internal: true
    deps:
      - core
      - node
      - components
      - task: webapp
        vars:
          NETWORK_ID: '{{.NETWORK_ID}}'
