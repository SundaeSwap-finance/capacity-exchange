version: '3'

# Internal tasks for the registry

tasks:
  # --- Compilation ---

  compile:
    deps: [':_build:extract-compactc']
    status:
      - test -f {{.ROOT_DIR}}/packages/registry/contract/out/contract/index.js
    env:
      COMPACTC: '{{.COMPACTC_BIN}}'
    cmds:
      - bun run --filter "@sundaeswap/capacity-exchange-registry" compile
