version: '3'

# Internal build tasks — TypeScript package build dependency graph and shared tooling.
# Included by root Taskfile.yml under the _build namespace.

tasks:
  # --- Bootstrap ---

  install:
    run: once
    cmds:
      - bun install

  compile-contracts:
    run: once
    cmds:
      - bun run compile

  # --- Package build graph ---

  midnight-core:
    deps: [install]
    cmds:
      - bun run --filter @sundaeswap/capacity-exchange-core build

  midnight-node:
    deps: [midnight-core]
    cmds:
      - bun run --filter @sundaeswap/capacity-exchange-nodejs build

  client:
    deps: [install]
    cmds:
      - bun run --filter @sundaeswap/capacity-exchange-client build

  libs:
    deps: [react-sdk]

  providers:
    deps: [midnight-node, client, compile-contracts]
    cmds:
      - bun run --filter @sundaeswap/capacity-exchange-providers build

  react-sdk:
    deps: [providers]
    cmds:
      - bun run --filter @sundaeswap/capacity-exchange-react-sdk build

  server:
    deps: [providers]
    cmds:
      - bun run --filter @capacity-exchange/server build

  webapp:
    deps: [libs]
    env:
      VITE_NETWORK_ID: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/demo build
    requires:
      vars: [NETWORK_ID]

  # --- Typecheck ---

  typecheck-demo-contracts:
    deps: [providers]
    cmds:
      - bun run --filter @capacity-exchange/demo-contracts build

  # TODO: Also typecheck test directories (packages/*/tests)
  build-all:
    deps: [libs, server, typecheck-demo-contracts]
    cmds:
      - bun run --filter @capacity-exchange/demo typecheck
