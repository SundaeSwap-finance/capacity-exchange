version: '3'

# Internal build tasks — TypeScript package build dependency graph.
# Included by root Taskfile.yml under the _build namespace.

tasks:
  # --- Bootstrap ---

  install:
    run: once
    cmds:
      - bun install

  # --- Package build graph ---

  midnight-core:
    deps: [install]
    cmds:
      - bun run --filter @capacity-exchange/midnight-core build

  midnight-node:
    deps: [midnight-core]
    cmds:
      - bun run --filter @capacity-exchange/midnight-node build

  client:
    deps: [install]
    cmds:
      - bun run --filter @capacity-exchange/client build

  components:
    deps: [midnight-node, client]
    cmds:
      - bun run --filter @capacity-exchange/components build

  libs:
    deps: [components]

  server:
    deps: [midnight-node]
    cmds:
      - bun run --filter @capacity-exchange/server build

  webapp:
    deps: [libs]
    env:
      VITE_NETWORK_ID: '{{.NETWORK_ID}}'
    cmds:
      - bun run --filter @capacity-exchange/example-webapp build
    requires:
      vars: [NETWORK_ID]

  # --- Typecheck ---

  typecheck-contracts:
    deps: [components]
    preconditions:
      - sh: test -d packages/bridge-contracts/vault/out
        msg: "Compiled vault contract output not found. Run 'task compile-contracts' first."
    cmds:
      - bun run --filter @capacity-exchange/example-contracts build
      - bun run --filter @capacity-exchange/bridge-contracts build

  # TODO: Also typecheck test directories (packages/*/tests)
  build-all:
    deps: [libs, server, typecheck-contracts]
    cmds:
      - bun run --filter @capacity-exchange/example-webapp typecheck
      - bun run --filter @capacity-exchange/bridge-webapp typecheck
