version: '3'

# Internal tasks for the bridge webapp.
# Included by root Taskfile.yml under the _bridge namespace.

tasks:
  copy-zk-assets:
    preconditions:
      - sh: test -d {{.ROOT_DIR}}/packages/bridge-contracts/vault/out/keys
        msg: 'Vault ZK keys not found. Run "task compile-bridge-contracts" first.'
    cmds:
      - bun run --filter @capacity-exchange/bridge-webapp copy-zk-assets

  require-zk-assets:
    run: once
    preconditions:
      - sh: test -d {{.ROOT_DIR}}/packages/bridge-webapp/public/midnight/vault/keys
        msg: 'Bridge webapp ZK assets not found. Run "NETWORK_ID={{.NETWORK_ID}} task dev:bridge" to set up.'

  require-env:
    run: once
    preconditions:
      - sh: test -f {{.ROOT_DIR}}/packages/bridge-webapp/.env
        msg: 'Bridge webapp .env not found. Copy .env.example and configure it.'
