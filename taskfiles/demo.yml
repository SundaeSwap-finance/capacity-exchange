version: '3'

# Internal tasks for the demo: contract compilation, deployment, and asset copying.
# Included by root Taskfile.yml under the _demo namespace.

tasks:
  # --- Asset copying ---

  copy-zk-assets:
    cmds:
      - bun run --filter @capacity-exchange/demo copy-zk-assets

  copy-configs:
    cmds:
      # Stage the active network's deploy bundle as the webapp's /contracts.json (the path
      # the demo fetches at runtime). No-op if the network hasn't been deployed locally.
      - cp {{.CONTRACTS_DIR}}/.contracts.{{.NETWORK_ID}}.deployed.json {{.WEBAPP_DIR}}/public/contracts.json 2>/dev/null || true

  # --- Preconditions ---

  require-deployed:
    run: once
    preconditions:
      - sh: 'test -f {{.WEBAPP_DIR}}/public/contracts.json && grep -q ''"network": "{{.NETWORK_ID}}"'' {{.WEBAPP_DIR}}/public/contracts.json'
        msg: "Deployed contract config for '{{.NETWORK_ID}}' not found at public/contracts.json. Run 'NETWORK_ID={{.NETWORK_ID}} task setup:demo' first."

  require-demo-price-config:
    run: once
    preconditions:
      - sh: 'bun {{.ROOT_DIR}}/scripts/demo-price-config.ts validate {{.NETWORK_ID}}'
        msg: "Demo price config invalid or missing. Run 'NETWORK_ID={{.NETWORK_ID}} task setup:demo' first."
